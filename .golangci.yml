version: "2"

linters:
  default: none

  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - errcheck
    - gochecknoglobals
    - gochecknoinits
    - gocritic
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl

  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/mfcochauxlaberge/jsonapi
            - github.com/stretchr/testify
            - github.com/davecgh/go-spew

    lll:
      line-length: 100
      tab-width: 4

  exclusions:
    rules:
      - path: doc.go
        linters:
          - lll

      - source: ^func
        linters:
          - lll

      - source: ^var update =
        linters:
          - gochecknoglobals

      - path: _test\.go
        linters:
          - revive
        text: dot-imports

      - path: jsonapi\.go
        linters:
          - revive
        text: redefines-builtin-id

      - path: jsonapi_test\.go
        linters:
          - revive
        text: redefines-builtin-id

      - path: examples/
        linters:
          - lll

      - path: type\.go
        linters:
          - gosec
        text: G115

      - path: range\.go
        linters:
          - gosec
        text: G115
